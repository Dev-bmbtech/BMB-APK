<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>B.M.B apk Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loader -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-circle">
      <span class="loader-text">LOAD</span>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">B.M.B APK</div>
    <form class="search-form" onsubmit="return false;">
      <input id="query" type="text" placeholder="Search APK (mf. WhatsApp, Facebook...)" autocomplete="off" />
      <button id="searchBtn" type="submit">Search</button>
    </form>
  </header>

  <!-- Content -->
  <div class="container">
    <div class="results" id="results"></div>
    <section id="apkSection"></section>
    <div class="error" id="error"></div>
  </div>

  <script src="main.js"></script>
  <script>
    // Kuondoa loader baada ya page kupakia
    window.addEventListener("load", () => {
      document.getElementById("pageLoader").style.display = "none";
    });
  </script>
</body>
</html>
